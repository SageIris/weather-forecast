<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>25软件一班_2502011052_周语歆_天气预报</title>
    <style>
        :root {
            --bg: #e8f0fe;
            --card: #ffffff;
            --text: #2c3e50;
            --accent: #5b9bd5;
            --shadow: 0 8px 30px rgba(0,0,0,0.06);
            --radius: 20px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #d4e4fc 0%, #e8f0fe 40%, #f0f4f8 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px 20px;
        }

        .weather-card {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 40px 35px;
            max-width: 480px;
            width: 100%;
            text-align: center;
        }

        .weather-card h2 {
            font-size: 1.5rem;
            color: var(--text);
            margin-bottom: 8px;
            font-weight: 600;
        }
        .weather-card .subtitle {
            font-size: 0.85rem;
            color: #999;
            margin-bottom: 25px;
        }

        /* 搜索框 */
        .search-box {
            display: flex;
            gap: 8px;
            margin-bottom: 25px;
        }
        .search-box input {
            flex: 1;
            padding: 10px 16px;
            border: 2px solid #e0e5ec;
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.25s;
        }
        .search-box input:focus {
            border-color: var(--accent);
        }
        .search-box button {
            padding: 10px 20px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .search-box button:hover {
            background: #4a8ac2;
        }

        /* 天气信息 */
        .weather-main {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        .weather-icon {
            font-size: 4rem;
        }
        .temperature {
            font-size: 3.5rem;
            font-weight: 700;
            color: var(--text);
        }
        .weather-desc {
            font-size: 1.1rem;
            color: #666;
            margin-bottom: 20px;
        }

        /* 详细数据 */
        .details-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            background: #f8fafc;
            border-radius: 14px;
            padding: 18px;
        }
        .detail-item {
            text-align: center;
        }
        .detail-item .label {
            font-size: 0.75rem;
            color: #aaa;
            margin-bottom: 4px;
        }
        .detail-item .value {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text);
        }

        .error-msg {
            color: #e74c3c;
            margin-top: 15px;
            font-size: 0.9rem;
        }

        .loading {
            color: #999;
        }

        @media (max-width: 480px) {
            .weather-card {
                padding: 25px 20px;
            }
            .temperature {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="weather-card">
        <h2>🌤️ 天气预报</h2>
        <p class="subtitle">实时天气数据查询</p>

        <div class="search-box">
            <input type="text" id="cityInput" placeholder="输入城市名，如 北京" />
            <button id="searchBtn">查询</button>
        </div>

        <div id="weatherResult">
            <p class="loading">请输入城市名查询天气</p>
        </div>
    </div>

    <script>
        // 天气图标映射
        const weatherIcons = {
            '晴': '☀️',
            '少云': '🌤️',
            '多云': '⛅',
            '阴': '☁️',
            '雨': '🌧️',
            '小雨': '🌦️',
            '中雨': '🌧️',
            '大雨': '🌧️',
            '雪': '❄️',
            '小雪': '🌨️',
            '雾': '🌫️',
            '霾': '🌫️',
            '雷阵雨': '⛈️',
            '阵雨': '🌦️',
        };

        // 根据天气描述返回图标
        function getWeatherIcon(desc) {
            if (!desc) return '🌈';
            for (const [key, icon] of Object.entries(weatherIcons)) {
                if (desc.includes(key)) return icon;
            }
            return '🌈';
        }

        // 通过浏览器内置的地理定位API获取当前城市
        async function getCurrentCity() {
            const response = await fetch('https://ipapi.co/json/');
            const data = await response.json();
            return data.city || '北京';
        }

        // 获取经纬度（用于Open-Meteo API）
        async function getCoordinates(city) {
            const url = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=zh&format=json`;
            const response = await fetch(url);
            const data = await response.json();
            if (data.results && data.results.length > 0) {
                return {
                    lat: data.results[0].latitude,
                    lon: data.results[0].longitude,
                    name: data.results[0].name || city
                };
            }
            return null;
        }

        // 获取天气数据（Open-Meteo免费API，无需注册）
        async function getWeather(lat, lon) {
            const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,wind_speed_10m,weather_code&timezone=auto&language=zh`;
            const response = await fetch(url);
            const data = await response.json();
            return {
                temperature: data.current.temperature_2m,
                humidity: data.current.relative_humidity_2m,
                windSpeed: data.current.wind_speed_10m,
                weatherCode: data.current.weather_code
            };
        }

        // 天气代码转中文描述
        function getWeatherDesc(code) {
            const codeMap = {
                0: '晴', 1: '少云', 2: '多云', 3: '阴',
                45: '雾', 48: '雾',
                51: '小雨', 53: '小雨', 55: '小雨',
                61: '雨', 63: '中雨', 65: '大雨',
                71: '雪', 73: '雪', 75: '雪',
                80: '阵雨', 81: '中雨', 82: '大雨',
                95: '雷阵雨', 96: '雷阵雨', 99: '雷阵雨'
            };
            return codeMap[code] || '多云';
        }

        // 渲染天气数据
        function renderWeather(cityName, weather) {
            const desc = getWeatherDesc(weather.weatherCode);
            const icon = getWeatherIcon(desc);
            const container = document.getElementById('weatherResult');

            container.innerHTML = `
                <div class="weather-main">
                    <div class="weather-icon">${icon}</div>
                    <div class="temperature">${weather.temperature}°C</div>
                </div>
                <div class="weather-desc">${cityName} · ${desc}</div>
                <div class="details-grid">
                    <div class="detail-item">
                        <div class="label">💧 湿度</div>
                        <div class="value">${weather.humidity}%</div>
                    </div>
                    <div class="detail-item">
                        <div class="label">🌬️ 风速</div>
                        <div class="value">${weather.windSpeed} km/h</div>
                    </div>
                    <div class="detail-item">
                        <div class="label">🌡️ 体感</div>
                        <div class="value">${Math.round(weather.temperature)}°C</div>
                    </div>
                </div>
            `;
        }

        // 显示错误信息
        function showError(msg) {
            document.getElementById('weatherResult').innerHTML = `<p class="error-msg">${msg}</p>`;
        }

        // 查询天气主函数
        async function searchWeather(city) {
            const resultDiv = document.getElementById('weatherResult');
            resultDiv.innerHTML = '<p class="loading">⏳ 正在查询...</p>';

            try {
                const coords = await getCoordinates(city);
                if (!coords) {
                    showError('❌ 未找到该城市，请检查拼写后重试');
                    return;
                }

                const weather = await getWeather(coords.lat, coords.lon);
                renderWeather(coords.name, weather);
            } catch (err) {
                showError('⚠️ 网络请求失败，请检查网络连接后重试');
                console.error('天气查询错误:', err);
            }
        }

        // 页面加载时自动获取用户所在城市天气
        window.addEventListener('DOMContentLoaded', async () => {
            try {
                const city = await getCurrentCity();
                if (city) {
                    document.getElementById('cityInput').value = city;
                    await searchWeather(city);
                }
            } catch {
                // 如果定位失败，默认查询北京
                document.getElementById('cityInput').value = '北京';
                await searchWeather('北京');
            }
        });

        // 绑定查询按钮
        document.getElementById('searchBtn').addEventListener('click', () => {
            const city = document.getElementById('cityInput').value.trim();
            if (city) {
                searchWeather(city);
            } else {
                showError('请输入城市名');
            }
        });

        // 回车查询
        document.getElementById('cityInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('searchBtn').click();
            }
        });
    </script>
</body>
</html>
